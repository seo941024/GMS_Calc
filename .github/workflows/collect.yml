name: Collect Rankings

on:
  schedule:
    - cron: '0 1 * * 2'  # 매주 화요일 오전 10시 (KST = UTC+9, 주간랭킹 기준)
  workflow_dispatch:       # 수동 실행 버튼도 생김

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install puppeteer @upstash/redis

      - name: Run crawler
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node GMS_WEEK_BOSS/scripts/crawl.js
